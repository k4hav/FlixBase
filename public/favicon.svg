<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1428"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e4a8"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a07828"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <!-- Film strip holes top -->
  <rect x="3" y="3" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="8" y="3" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="13" y="3" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="18" y="3" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="23" y="3" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="28" y="3" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <!-- Film strip holes bottom -->
  <rect x="3" y="26" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="8" y="26" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="13" y="26" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="18" y="26" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="23" y="26" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <rect x="28" y="26" width="3" height="3" rx="0.8" fill="rgba(201,168,76,0.3)"/>
  <!-- F letter - FlixBase -->
  <text x="16" y="22" font-family="Georgia,serif" font-size="16" font-weight="bold"
    fill="url(#gold)" text-anchor="middle" filter="url(#glow)">F</text>
  <!-- Glow dot -->
  <circle cx="22" cy="10" r="2" fill="#c9a84c" opacity="0.6"/>
</svg>
